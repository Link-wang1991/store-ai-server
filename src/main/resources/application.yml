server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: store-ai-server
  # 生产环境必须显式设置 SPRING_PROFILES_ACTIVE；演示数据仅在 dev profile 下初始化。
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:}
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX:20}
      minimum-idle: ${DB_POOL_MIN_IDLE:5}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    repair-on-migrate: true
  servlet:
    multipart:
      max-file-size: 60MB
      max-request-size: 61MB

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.storeai.*.entity
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.nologging.NoLoggingImpl

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:604800000}

storage:
  provider: ${STORAGE_PROVIDER:local}
  local-path: ${STORAGE_LOCAL_PATH:./uploads/meeting-audio}

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-knowledge: ${MINIO_BUCKET_KNOWLEDGE:store-knowledge}
  bucket-meeting: ${MINIO_BUCKET_MEETING:store-meeting}

ai:
  provider: ${AI_PROVIDER:mock}
  deepseek:
    api-key: ${DEEPSEEK_API_KEY:}
    base-url: ${DEEPSEEK_BASE_URL:https://api.deepseek.com}
    model: ${DEEPSEEK_MODEL:deepseek-chat}
  qwen:
    api-key: ${QWEN_API_KEY:}
    text-model: ${QWEN_TEXT_MODEL:qwen-plus}
    vision-model: ${QWEN_VISION_MODEL:qwen-vl-plus}
    asr-api-url: https://dashscope.aliyuncs.com/api/v1/services/audio/asr/asynctask

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
