server:
  port: 8080

spring:
  application:
    name: store-ai-server
  profiles:
    active: dev

  datasource:
    url: ${DB_URL:jdbc:mysql://rm-wz985705s2po670h4ro.mysql.rds.aliyuncs.com:3306/store-ai?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${DB_USERNAME:store_ai}
    password: ${DB_PASSWORD:Gaoxiaoli2010}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

mybatis-plus:
  mapper-locations: classpath*:/mapper/**/*.xml
  type-aliases-package: com.storeai.*.entity
  global-config:
    db-config:
      id-type: assign_id
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT
jwt:
  secret: ${JWT_SECRET:store-ai-jwt-secret-key-must-be-at-least-256-bits-long}
  expiration: 604800000  # 7 天 (毫秒)

# MinIO
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket-knowledge: ${MINIO_BUCKET_KNOWLEDGE:store-knowledge}
  bucket-meeting: ${MINIO_BUCKET_MEETING:store-meeting}

# AI
ai:
  provider: deepseek
  deepseek:
    api-key: sk-5c9abee0cf3941f9bc3614eec7236939
    base-url: https://api.deepseek.com
    model: deepseek-v4-pro
  qwen:
    api-key: sk-1441823d0d384ae2a0fb0db0ea4a65d2
    text-model: qwen3.6-plus
    vision-model: qwen3.6-plus
    asr-api-url: https://dashscope.aliyuncs.com/api/v1/services/audio/asr/asynctask

# SpringDoc
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
